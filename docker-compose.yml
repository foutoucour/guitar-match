version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: guitar-match-db
    environment:
      POSTGRES_USER: guitar
      POSTGRES_PASSWORD: guitar
      POSTGRES_DB: guitar_match
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
